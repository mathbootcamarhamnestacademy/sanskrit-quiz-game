<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArhamNest Sanskrit Quest</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="homeScreen" class="container">

<div class="logo">🪔</div>

<h1>ArhamNest Academy</h1>

<h2>Sanskrit Quest</h2>

<p class="tagline">
Learn • Play • Master Sanskrit
</p>

<input
id="studentName"
type="text"
placeholder="👤 Enter Student Name">

<select id="chapter">

<option>Chapter 1 - वन्दना</option>

<option>Chapter 2 - वर्णमाला</option>

<option>Chapter 3 - शब्दरूप</option>

</select>

<button id="startBtn">
🚀 START QUEST
</button>

</div>

<div id="quizScreen" class="container" style="display:none;">

<div class="top">

<div id="lives">❤️❤️❤️</div>

<div id="score">⭐ 0 XP</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<h3 id="question"></h3>

<div id="options"></div>

<p id="message"></p>

<button id="nextBtn">
Next ➜
</button>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
