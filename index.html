<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskrit Quiz Game</title>

<style>
body{
font-family:Arial;
background:#f4f8ff;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px gray;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#2196F3;
color:white;
border-radius:10px;
cursor:pointer;
}

#result{
font-size:22px;
font-weight:bold;
margin:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 Sanskrit Quiz Game</h1>

<h2 id="score">Score : 0</h2>

<div id="quiz"></div>

<div id="result"></div>

<button onclick="nextQuestion()">Next Question</button>

</div>

<script>

let score=0;

let current=0;

const quiz=[
{
q:"अहम् means?",
options:["I","You","He","They"],
answer:0
},
{
q:"त्वम् means?",
options:["You","He","We","I"],
answer:0
},
{
q:"बालकः means?",
options:["Girl","Boy","Teacher","Book"],
answer:1
},
{
q:"फलम् means?",
options:["Leaf","Fruit","Flower","Water"],
answer:1
},
{
q:"गच्छति means?",
options:["Runs","Reads","Goes","Writes"],
answer:2
}
];

function loadQuestion(){

if(current>=quiz.length){

document.getElementById("quiz").innerHTML="<h2>Game Over!</h2>";

document.getElementById("result").innerHTML="Final Score : "+score;

return;

}

let q=quiz[current];

let html="<h2>"+q.q+"</h2>";

for(let i=0;i<q.options.length;i++){

html+="<button class='option' onclick='check("+i+")'>"+q.options[i]+"</button>";

}

document.getElementById("quiz").innerHTML=html;

}

function check(i){

if(i==quiz[current].answer){

score+=10;

document.getElementById("result").innerHTML="✅ Correct! +10";

}
else{

score-=5;

document.getElementById("result").innerHTML="❌ Wrong! -5";

}

document.getElementById("score").innerHTML="Score : "+score;

}

function nextQuestion(){

current++;

document.getElementById("result").innerHTML="";

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
